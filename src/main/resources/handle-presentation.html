        id="svgCanvas"
        width="100%"

></canvas>

    var presentationName = '%PRESENTATION_NAME%';
    var renderId = '%RENDER_ID%';
    var renderPageNumber = '%PAGE_NUMBER%';
    var renderPageNumber0 = '%PAGE_NUMBER_0%';
    var renderPageCount = '%PAGE_COUNT%';
    var parameterValues = JSON.parse('%PARAMETER_VALUES%');
</script>
<script src="/lean/api/static/lean-rest.js"></script>
