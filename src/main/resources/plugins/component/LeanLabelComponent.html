<!-- Show the name of the presentation -->
<label for="presentationName">Presentation name: </label>
<input type="text" id="presentationName" name="presentationName" readonly style="background: lightgray">
<br>

<!-- Edit the name of the component -->
<label for="componentName">Component name: </label>
<input type="text" id="componentName" name="componentName">
<br>
<br>

<button type="button" class="collapsible">Label</button>
<div class="content" style="display: block">
    <!-- The label text -->
    <label for="label">Label text </label>
    <input type="text" id="label">
    <br>
    <input type="checkbox" id="underline">
    <label for="underline">Underline? </label>
    <br>
    <label for="horizontalAlignment">Horizontal alignment </label>
    <select id="horizontalAlignment" style="width: 50%"></select>
    <br>
    <label for="verticalAlignment">Vertical alignment </label>
    <select id="verticalAlignment" style="width: 50%"></select>
    <br>
    <br>
</div>

<button type="button" class="collapsible">General component options</button>
<div class="content" style="display: none">
    <input type="checkbox" id="border">
    <label for="border">Draw border? </label>
    <input id="borderColor" type="color" style="width: 50%;horiz-align: right;border: none transparent">
    <br>
    <input type="checkbox" id="background">
    <label for="background">Draw background? </label>
    <input id="backGroundColor" type="color" style="width: 50%;horiz-align: right;border: none transparent">
    <br>
    <label for="themeName">Theme name </label>
    <select id="themeName" style="width: 50%"></select>
    <br>
    <input type="checkbox" id="setDefaultFont">
    <label for="defaultFontName">Default font </label>
    <input id="defaultFontName" type="text" style="width: 25%">
    <input id="defaultFontSize" type="text" style="width: 10%">
    <label for="defaultFontBold">bold? </label>
    <input id="defaultFontBold" type="checkbox">
    <label for="defaultFontItalic">italic? </label>
    <input id="defaultFontItalic" type="checkbox">
    <br>
    <input type="checkbox" id="setDefaultColor">
    <label for="defaultColor">Default color </label>
    <input id="defaultColor" type="color" style="width: 50%;horiz-align: right;border: none transparent">
    <br>

    <br>
</div>

<button type="button" class="collapsible">Layout options</button>
<div class="content" style="display: none">
    <!-- Left alignment -->
    <fieldset style="border-width: 1px;border-color: #777777">
        <Legend>Left alignment</Legend>
        <label for="leftEnabled">Left aligned</label><input type="checkbox" id="leftEnabled">
        <label for="leftObjectName"> to </label>
        <select id="leftObjectName" style="width: 50%"></select><br>
        <label for="leftOffset">Offset: </label><input type="text" id="leftOffset" style="width: 20%">
        <label for="leftPercentage">Percentage: </label><input type="text" id="leftPercentage" style="width: 20%">
        <label for="leftAlignment">From </label><select id="leftAlignment" style="width: 20%"></select><br>
    </fieldset>
    <!-- Right alignment -->
    <fieldset style="border-width: 1px;border-color: #777777">
        <Legend>Right alignment</Legend>
        <label for="rightEnabled">Right aligned</label><input type="checkbox" id="rightEnabled">
        <label for="rightObjectName"> to: </label>
        <select id="rightObjectName" style="width: 50%"></select><br>
        <label for="rightOffset">Offset: </label><input type="text" id="rightOffset" style="width: 20%">
        <label for="rightPercentage">Percentage: </label><input type="text" id="rightPercentage" style="width: 20%">
        <label for="rightAlignment">From </label><select id="rightAlignment" style="width: 20%"></select><br>
    </fieldset>
    <!-- Top alignment -->
    <fieldset style="border-width: 1px;border-color: #777777">
        <Legend>Top alignment</Legend>
        <label for="topEnabled">Top aligned</label><input type="checkbox" id="topEnabled">
        <label for="topObjectName"> to: </label>
        <select id="topObjectName" style="width: 50%"></select><br>
        <label for="topOffset">Offset: </label><input type="text" id="topOffset" style="width: 20%">
        <label for="topPercentage">Percentage: </label><input type="text" id="topPercentage" style="width: 20%">
        <label for="topAlignment">From </label><select id="topAlignment" style="width: 20%"></select><br>
    </fieldset>
    <!-- Bottom alignment -->
    <fieldset style="border-width: 1px;border-color: #777777">
        <Legend>Bottom alignment</Legend>
        <label for="bottomEnabled">Bottom aligned</label><input type="checkbox" id="bottomEnabled">
        <label for="bottomObjectName"> to: </label>
        <select id="bottomObjectName" style="width: 50%"></select><br>
        <label for="bottomOffset">Offset: </label><input type="text" id="bottomOffset" style="width: 20%">
        <label for="bottomPercentage">Percentage: </label><input type="text" id="bottomPercentage" style="width: 20%">
        <label for="bottomAlignment">From </label><select id="bottomAlignment" style="width: 20%"></select><br>
    </fieldset>
    <br>
</div>

<!-- Buttons at the bottom -->
<br>
<button type="button" id="editButtonSave" onclick="saveComponent()">Save</button>
<button type="button" id="editButtonClose" onclick="closeComponent()">Close</button>

<!-- The script which will initialize drop-down boxes and so on.
-->
<script id="initScript">
    setSelectOptions('horizontalAlignment', HORIZONTAL_ALIGNMENTS);
    setSelectOptions('verticalAlignment', VERTICAL_ALIGNMENTS);
    setSelectOptions('themeName', themeNames);
    setSelectOptions('topObjectName', componentNames);
    setSelectOptions('leftObjectName', componentNames);
    setSelectOptions('rightObjectName', componentNames);
    setSelectOptions('bottomObjectName', componentNames);
    setSelectOptions("leftAlignment", HORIZONTAL_ALIGNMENTS);
    setSelectOptions("rightAlignment", HORIZONTAL_ALIGNMENTS);
    setSelectOptions("topAlignment", VERTICAL_ALIGNMENTS);
    setSelectOptions("bottomAlignment", VERTICAL_ALIGNMENTS);

    // The collapsible sections...
    //
    $('.collapsible').click(function () {
            let c = $(this).next();
            console.log('First child display: ' + c.css('display'));
            if (c.css('display') === "block") {
                c.css('display', 'none');
            } else {
                c.css('display', 'block');
            }
        }
    );
</script>

<!-- The script which will put values from componentJson on all the input fields
-->
<script id="loadScript">
    let iComponent = componentJson["component"][componentPluginId];
    let sourceConnectorName = iComponent["sourceConnectorName"]
    document.getElementById("presentationName").value = presentationName;
    setElement(componentJson, "componentName", "name");

    // The label section
    //
    setElement(iComponent, "label", "label");
    setChecked(iComponent, "underline", "underline");
    setElement(iComponent, "horizontalAlignment", "horizontalAlignment");
    setElement(iComponent, "verticalAlignment", "verticalAlignment");

    // General options
    //
    setElement(iComponent, "themeName", "themeName");
    setFont(iComponent, "defaultFont", "setDefaultFont", "defaultFont");
    setColor(iComponent, "defaultColor", "setDefaultColor", "defaultColor", "#ffffff");
    setColor(iComponent, "backGroundColor", "background", "backGroundColor", "#ffffff");
    setColor(iComponent, "borderColor", "border", "borderColor", "#000000");

    // Layout options
    //
    setLayout(componentJson, "left");
    setLayout(componentJson, "right");
    setLayout(componentJson, "top");
    setLayout(componentJson, "bottom");
</script>

<script id="componentSaveScript">
    let iComponent = componentJson["component"][componentPluginId];
    componentJson["component"]["name"] = document.getElementById("componentName").value;

    // Label section
    //
    getElement(iComponent, "label", "label");
    getChecked(iComponent, "underline", "underline");
    getElement(iComponent, "horizontalAlignment", "horizontalAlignment");
    getElement(iComponent, "verticalAlignment", "verticalAlignment");

    // General settings
    //
    getColor(iComponent, "borderColor", "border", "borderColor");
    getColor(iComponent, "backGroundColor", "background", "backGroundColor");
    getElementInteger(iComponent, "themeName", "themeName");
    getFont(iComponent, "defaultFont", "setDefaultFont", "defaultFont");
    getColor(iComponent, "defaultColor", "setDefaultColor", "defaultColor");

    // Get the layout options
    //
    getLayout(componentJson, "left");
    getLayout(componentJson, "right");
    getLayout(componentJson, "top");
    getLayout(componentJson, "bottom");
</script>
